<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8"><meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://maumjqciuxdbwjtvcpsy.supabase.co https://maumjqciuxdbwjtvcpsy.functions.supabase.co wss://maumjqciuxdbwjtvcpsy.supabase.co; form-action 'self'; frame-src 'self'; upgrade-insecure-requests"><meta name="referrer" content="strict-origin-when-cross-origin">

<title>Contul meu — Clubul Financiar</title>
<link rel="icon" type="image/png" href="/favicon.png"><link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#0f2540">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin><link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,600;9..144,1,400&family=Sora:wght@600;700;800&display=swap"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,600;9..144,1,400&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'"><noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,600;9..144,1,400&family=Sora:wght@600;700;800&display=swap" rel="stylesheet"></noscript>
<style>
  :root{--navy:#0f2540;--navy2:#081728;--gold:#E8C268;--gold2:#F3D690;--green:#36D67E;--ink:#cbd7ea;--white:#f4ecd8}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:radial-gradient(1100px 560px at 82% -12%,#103154,transparent 62%),linear-gradient(160deg,var(--navy),var(--navy2));color:var(--white);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:440px;background:rgba(255,255,255,.04);border:1px solid rgba(232,194,104,.18);
    border-radius:18px;padding:32px 28px;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;inset:0 0 auto 0;height:2px;
    background:linear-gradient(90deg,transparent,var(--gold2),transparent);opacity:.7}
  .crest{display:block;margin:0 auto 12px;border-radius:12px}
  .brand{font-family:'Fraunces',Georgia,serif;text-align:center;letter-spacing:.22em;text-transform:uppercase;font-size:.78rem;color:var(--gold);font-weight:600;margin-bottom:6px}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:600;letter-spacing:-.01em;text-align:center;font-size:1.6rem;margin-bottom:6px}
  .email{text-align:center;color:var(--gold);font-weight:600;word-break:break-all;margin-bottom:24px}
  h3{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:.82rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:22px 0 10px;border-top:1px solid rgba(232,194,104,.14);padding-top:18px}
  form{display:flex;flex-direction:column;gap:10px}
  input{width:100%;padding:11px;border-radius:10px;border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.06);color:var(--white);font:inherit;font-size:.92rem}
  input::placeholder{color:#7d93b8}
  input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,194,104,.16)}
  .act{background:linear-gradient(135deg,var(--gold),#C68F2C);color:#1a1208;font-family:inherit;font-weight:700;
    border:none;padding:11px;border-radius:10px;cursor:pointer;font-size:.92rem}
  .logout{margin-top:24px;background:transparent;border:1px solid rgba(255,255,255,.25);color:var(--white);
    padding:12px;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:600;width:100%}
  .logout:hover{border-color:#ff9a9a;color:#ff9a9a}
  .home{display:block;text-align:center;margin-top:18px;color:#7d93b8;font-size:.85rem;text-decoration:none}
  .msg{font-size:.84rem;min-height:16px;margin-top:6px}
  .msg.err{color:#ff9a9a}.msg.ok{color:var(--green)}
</style>
</head>
<body>
  <div class="card">
    <img class="crest" src="/icon-64.png" alt="" width="42" height="42">
    <p class="brand">Clubul Financiar</p>
    <h1>Contul meu</h1>
    <p class="email" id="curEmail">…</p>

    <h3>Schimbă parola</h3>
    <form id="pwForm">
      <input type="password" id="newPw" placeholder="Parolă nouă (min. 6)" minlength="6" autocomplete="new-password" required>
      <button class="act" type="submit">Schimbă parola</button>
      <p class="msg" id="pwMsg"></p>
    </form>

    <h3>Schimbă emailul</h3>
    <form id="emailForm">
      <input type="email" id="newEmail" placeholder="Email nou" autocomplete="email" required>
      <button class="act" type="submit">Schimbă emailul</button>
      <p class="msg" id="emailMsg"></p>
    </form>

    <h3>Părerea ta contează</h3>
    <p style="margin:0 0 12px;opacity:.85">Spune-ne ce să îmbunătățim, reparăm sau adăugăm — ne ajută enorm.</p>
    <a class="act" href="/feedback" style="display:block;text-align:center;text-decoration:none;box-sizing:border-box">Trimite feedback</a>

    <a href="/ultra" style="display:block;text-align:center;margin-top:18px;color:#E8C268;font-weight:700;text-decoration:none">◆ Planul Ultra — vezi ce include</a>

    <button class="logout" id="logout">Deconectează-te</button>
    <a class="home" href="./index.html">← Înapoi la site</a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.js" integrity="sha384-nD3dwv4+ZqdYnmZKe/249ImlV04om7xTCcsoSeQYI+RO+XlKPoqAWaJR1M5SJH9p" crossorigin="anonymous"></script>
  <script>
    const sb = window.supabase.createClient(
      "https://maumjqciuxdbwjtvcpsy.supabase.co",
      "sb_publishable_N6X3B_Sn7oWkxJF-iHCfbg__w4J7ONR");
    const $ = (id) => document.getElementById(id);
    const setMsg = (id, t, ok) => { const m = $(id); m.textContent = t; m.className = "msg " + (ok ? "ok" : "err"); };

    // cere autentificare
    sb.auth.getSession().then(({ data }) => {
      if (!data.session) { location.replace("./login.html"); return; }
      $("curEmail").textContent = data.session.user.email || "cont conectat";
    });

    $("pwForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      setMsg("pwMsg", "Se salvează…", true);
      const { error } = await sb.auth.updateUser({ password: $("newPw").value });
      if (error) return setMsg("pwMsg", error.message, false);
      setMsg("pwMsg", "Parolă schimbată ✓", true); $("newPw").value = "";
    });

    $("emailForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      setMsg("emailMsg", "Se trimite confirmarea…", true);
      const { error } = await sb.auth.updateUser({ email: $("newEmail").value.trim() });
      if (error) return setMsg("emailMsg", error.message, false);
      setMsg("emailMsg", "Verifică NOUL email pentru confirmare ✓", true);
    });

    $("logout").addEventListener("click", async () => { await sb.auth.signOut(); location.replace("./index.html"); });
  </script>
</body>
</html>
