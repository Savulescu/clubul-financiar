<link rel="stylesheet" href="/assets/cf-ultra.css?v=3"></head><body class="u-page">
<section class="section"><div class="container">
<div class="center" style="margin-bottom:6px"><p class="eyebrow">Panou administrator</p><h1 class="title">Statistici vizitatori</h1><p class="lead" style="margin-inline:auto">Câți oameni au intrat pe clubulfinanciar.ro, pe intervale.</p></div>
<div id="statState" class="search-hint" style="text-align:center;margin:30px 0">Se verifică accesul…</div>
<div id="statGrid" class="grid grid-3" hidden style="margin-top:24px"></div>
<p id="statNote" class="lead" hidden style="margin:28px auto 0;text-align:center;font-size:.92rem">Datele se numără de la instalare (19 iunie 2026). Intervalele lungi se umplu pe măsură ce trece timpul.</p>
</div></section>
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.js" integrity="sha384-nD3dwv4+ZqdYnmZKe/249ImlV04om7xTCcsoSeQYI+RO+XlKPoqAWaJR1M5SJH9p" crossorigin="anonymous"></script>
<script defer src="/assets/site.js?v=30"></script>
<script defer>
(function(){
  var RANGES = [
    ["h24","Ultimele 24 de ore"],["d7","Ultima săptămână"],["d30","Ultima lună"],
    ["d90","Ultimele 3 luni"],["d180","Ultimele 6 luni"],["d365","Ultimul an"],["total","Total (de la start)"]
  ];
  var state=document.getElementById("statState"), grid=document.getElementById("statGrid"), note=document.getElementById("statNote");
  var nf = new Intl.NumberFormat("ro-RO");
  function render(d){
    grid.innerHTML = RANGES.map(function(r){
      var v=(d&&d[r[0]])||{views:0,visitors:0};
      return '<div class="card" style="text-align:center"><p class="eyebrow" style="margin-bottom:6px">'+r[1]+'</p>'+
        '<div class="result-big" style="font-size:2.2rem">'+nf.format(v.visitors||0)+'</div>'+
        '<p style="color:var(--muted);font-size:.85rem;margin-top:2px">vizitatori unici</p>'+
        '<p style="color:var(--muted);font-size:.82rem;margin-top:8px">'+nf.format(v.views||0)+' afișări de pagină</p></div>';
    }).join("");
    grid.hidden=false; note.hidden=false; state.hidden=true;
  }
  function load(){
    var sb=window._sb;
    if(!sb){ state.textContent="Eroare: conexiunea nu e disponibilă."; return; }
    if(!window.cfAdmin){ state.innerHTML='Această pagină e doar pentru administrator.<br>Conectează-te cu contul de admin (clubulfinanciar@gmail.com).'; return; }
    state.textContent="Se încarcă datele…";
    sb.rpc("cf_stats").then(function(res){
      if(res.error){ state.textContent="Nu am putut încărca statisticile: "+res.error.message; return; }
      render(res.data);
    });
  }
  // site.js emite 'cf-auth' după ce verifică sesiunea; reacționăm la el + încercăm o dată direct
  window.addEventListener("cf-auth", load);
  window.addEventListener("DOMContentLoaded", function(){ setTimeout(load, 1200); });
})();
</script>
</body></html>
