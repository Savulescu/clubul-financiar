<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cont — Clubul Financiar</title>
<style>
  :root{--navy:#0e2750;--navy2:#081428;--gold:#E8C268;--green:#36D67E;--ink:#cbd7ea;--white:#f4ecd8}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,var(--navy),var(--navy2));color:var(--white);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:400px;background:rgba(255,255,255,.04);border:1px solid rgba(232,194,104,.18);
    border-radius:18px;padding:34px 28px}
  .brand{text-align:center;letter-spacing:.16em;text-transform:uppercase;font-size:.78rem;color:var(--gold);font-weight:700;margin-bottom:6px}
  h1{text-align:center;font-size:1.5rem;margin-bottom:22px}
  .oauth{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
  .oauth button{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
    padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.18);background:#fff;color:#1a1208;
    font-weight:600;font-size:.95rem;cursor:pointer}
  .oauth button:hover{opacity:.92}
  .oauth .fb{background:#1877F2;color:#fff;border-color:#1877F2}
  .divider{display:flex;align-items:center;gap:12px;color:#7d93b8;font-size:.82rem;margin:14px 0}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.12)}
  form{display:flex;flex-direction:column;gap:12px}
  input{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.06);color:var(--white);font-size:.95rem}
  input::placeholder{color:#7d93b8}
  .submit{background:linear-gradient(135deg,var(--gold),#C68F2C);color:#1a1208;font-weight:800;
    border:none;padding:13px;border-radius:10px;cursor:pointer;font-size:.98rem}
  .toggle{text-align:center;margin-top:16px;font-size:.9rem;color:var(--ink)}
  .toggle a{color:var(--gold);cursor:pointer;text-decoration:none}
  #msg{text-align:center;margin-top:14px;font-size:.88rem;min-height:18px}
  #msg.err{color:#ff9a9a}#msg.ok{color:var(--green)}
  .logged{text-align:center}
  .logged .email{color:var(--gold);font-weight:700;margin:10px 0 22px;word-break:break-all}
  .logout{background:transparent;border:1px solid rgba(255,255,255,.25);color:var(--white);
    padding:12px 22px;border-radius:10px;cursor:pointer;font-weight:600}
  .home{display:block;text-align:center;margin-top:20px;color:#7d93b8;font-size:.85rem;text-decoration:none}
  .note{text-align:center;color:#7d93b8;font-size:.78rem;margin-top:18px}
</style>
</head>
<body>
  <div class="card">
    <p class="brand">Clubul Financiar</p>

    <!-- DECONECTAT -->
    <div id="loggedOut">
      <h1 id="title">Intră în cont</h1>
      <div class="oauth">
        <button id="googleBtn">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.7-6.7C35.6 2.6 30.1 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.8 6.1C12.2 13.2 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.5 3-2.2 5.5-4.7 7.2l7.3 5.7c4.3-4 6.2-9.9 6.2-17.4z"/><path fill="#FBBC05" d="M10.3 28.6c-.5-1.4-.8-2.9-.8-4.6s.3-3.2.8-4.6l-7.8-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.5 10.7l7.8-6.1z"/><path fill="#34A853" d="M24 48c6.1 0 11.3-2 15-5.5l-7.3-5.7c-2 1.4-4.7 2.3-7.7 2.3-6.4 0-11.8-3.7-13.7-9.1l-7.8 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
          Continuă cu Google
        </button>
        <button id="facebookBtn" class="fb">Continuă cu Facebook</button>
      </div>
      <div class="divider">sau cu email</div>
      <form id="authForm">
        <input type="email" id="email" placeholder="Email" autocomplete="email" required>
        <input type="password" id="password" placeholder="Parolă (min. 6 caractere)" autocomplete="current-password" minlength="6" required>
        <button type="submit" class="submit" id="submitBtn">Conectează-te</button>
      </form>
      <p class="toggle" id="toggle">Nu ai cont? <a id="toggleLink">Înregistrează-te</a></p>
      <p id="msg"></p>
    </div>

    <!-- CONECTAT -->
    <div id="loggedIn" class="logged" style="display:none">
      <h1>Bine ai venit! 🎉</h1>
      <p class="email" id="userEmail"></p>
      <button class="logout" id="logoutBtn">Deconectează-te</button>
    </div>

    <a class="home" href="./index.html">← Înapoi la site</a>
    <p class="note">⚠️ Conținut educativ, nu sfat de investiții.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ⚠️ Se completează cu valorile din proiectul Supabase
    const SUPABASE_URL = "https://maumjqciuxdbwjtvcpsy.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_N6X3B_Sn7oWkxJF-iHCfbg__w4J7ONR";

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const $ = (id) => document.getElementById(id);
    let signupMode = false;

    function setMsg(text, ok) { const m = $("msg"); m.textContent = text; m.className = ok ? "ok" : "err"; }

    function renderSession(session) {
      if (session && session.user) {
        $("loggedOut").style.display = "none";
        $("loggedIn").style.display = "block";
        $("userEmail").textContent = session.user.email || session.user.user_metadata?.name || "cont conectat";
      } else {
        $("loggedOut").style.display = "block";
        $("loggedIn").style.display = "none";
      }
    }

    // toggle înregistrare / conectare
    $("toggleLink").addEventListener("click", () => {
      signupMode = !signupMode;
      $("title").textContent = signupMode ? "Creează cont" : "Intră în cont";
      $("submitBtn").textContent = signupMode ? "Înregistrează-te" : "Conectează-te";
      $("toggle").innerHTML = signupMode
        ? 'Ai deja cont? <a id="toggleLink">Conectează-te</a>'
        : 'Nu ai cont? <a id="toggleLink">Înregistrează-te</a>';
      document.getElementById("toggleLink").addEventListener("click", () => location.reload());
      setMsg("");
    });

    // email / parolă
    $("authForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = $("email").value.trim(), password = $("password").value;
      setMsg(signupMode ? "Se creează contul…" : "Se conectează…", true);
      const { data, error } = signupMode
        ? await sb.auth.signUp({ email, password })
        : await sb.auth.signInWithPassword({ email, password });
      if (error) return setMsg(error.message, false);
      if (signupMode && !data.session) return setMsg("Cont creat! Verifică emailul pentru confirmare.", true);
      // sesiunea se prinde de onAuthStateChange
    });

    // OAuth
    const redirectTo = window.location.origin + window.location.pathname;
    $("googleBtn").addEventListener("click", () =>
      sb.auth.signInWithOAuth({ provider: "google", options: { redirectTo } }));
    $("facebookBtn").addEventListener("click", () =>
      sb.auth.signInWithOAuth({ provider: "facebook", options: { redirectTo } }));

    // logout
    $("logoutBtn").addEventListener("click", async () => { await sb.auth.signOut(); });

    // stare inițială + ascultă schimbările
    sb.auth.getSession().then(({ data }) => renderSession(data.session));
    sb.auth.onAuthStateChange((_event, session) => renderSession(session));
  </script>
</body>
</html>
