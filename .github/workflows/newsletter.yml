name: Newsletter (Dimineața pe scurt)

# - schedule  → trimite LIVE newsletterul Free abonaților (în fiecare dimineață, zile lucrătoare)
# - manual cu test_email → trimite Free DOAR la acea adresă (test)
# - manual fără test_email → doar regenerează preview-urile
on:
  schedule:
    # Țintă: 07:30 ora României, în fiecare zi lucrătoare. GitHub rulează în UTC și NU
    # știe de ora de vară, iar cron-urile lor se mai întârzie/sar. De aceea pornim mai
    # multe sloturi UTC, iar scriptul (--gate-0730) trimite DOAR de la 07:30 RO, o singură
    # dată/zi (--once). 04:30 UTC = 07:30 RO vara; 05:30 UTC = 07:30 RO iarna.
    - cron: '30 4 * * *'   # 07:30 RO (vara) — în fiecare zi
    - cron: '0 5 * * *'    # backup întârziere
    - cron: '30 5 * * *'   # 07:30 RO (iarna) — în fiecare zi
    - cron: '0 6 * * *'    # backup
    - cron: '30 6 * * *'   # backup final
  workflow_dispatch:
    inputs:
      test_email:
        description: "Test la o adresă (un singur email). Lasă gol dacă folosești 'live' sau doar preview."
        required: false
        default: ""
      live:
        description: "Trimite LIVE acum la TOȚI abonații (free/premium/pro/ultra) — fluxul de dimineață"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Newsletter (send / test / preview)
        env:
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_FROM:      ${{ secrets.REMINDER_FROM }}
          NEWSLETTER_OWNER:     ${{ secrets.NEWSLETTER_OWNER }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          TOGETHER_API_KEY:     ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
          NVIDIA_API_KEY:       ${{ secrets.NVIDIA_API_KEY }}
          SAMBANOVA_API_KEY:    ${{ secrets.SAMBANOVA_API_KEY }}
          FIREWORKS_API_KEY:    ${{ secrets.FIREWORKS_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Trimitere LIVE toate tier-urile (free/premium/pro/ultra←pro), 07:30 RO, idempotent…"
            python newsletter_build.py --send-all --confirm --once --gate-0730
          elif [ "${{ github.event.inputs.live }}" = "true" ]; then
            echo "Trimitere LIVE manuală (toate tier-urile, fără guard ca să poți retesta)…"
            python newsletter_build.py --send-all --confirm
          elif [ -n "${{ github.event.inputs.test_email }}" ]; then
            python newsletter_build.py --test "${{ github.event.inputs.test_email }}"
          else
            python newsletter_build.py
          fi
      - name: Commit preview-uri + state (mereu — state-ul e necesar guard-ului idempotent)
        if: always()
        run: |
          git config user.name "Clubul Financiar"
          git config user.email "clubulfinanciar@gmail.com"
          git add docs/newsletter/preview/*.html docs/newsletter/.sent_state.json 2>/dev/null || true
          if git diff --staged --quiet; then echo "nimic de comis"; exit 0; fi
          git commit -m "Newsletter: preview + state trimitere ($(date -u +%Y-%m-%dT%H:%MZ))"
          for i in 1 2 3 4 5 6; do
            if git push origin HEAD:main; then echo "pushed"; exit 0; fi
            git fetch origin main; git rebase -X theirs origin/main || git rebase --abort; sleep $((i*3))
          done
