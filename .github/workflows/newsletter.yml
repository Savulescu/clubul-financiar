name: Newsletter (Dimineața pe scurt)

# - schedule  → trimite LIVE newsletterul Free abonaților (în fiecare dimineață, zile lucrătoare)
# - manual cu test_email → trimite Free DOAR la acea adresă (test)
# - manual fără test_email → doar regenerează preview-urile
on:
  schedule:
    - cron: '30 5 * * 1-5'   # ~07:30 RO (vara ~08:30), luni–vineri
  workflow_dispatch:
    inputs:
      test_email:
        description: "Email pentru un test (lasă gol = doar preview, fără trimitere)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Newsletter (send / test / preview)
        env:
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_FROM:      ${{ secrets.REMINDER_FROM }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          TOGETHER_API_KEY:     ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
          NVIDIA_API_KEY:       ${{ secrets.NVIDIA_API_KEY }}
          SAMBANOVA_API_KEY:    ${{ secrets.SAMBANOVA_API_KEY }}
          FIREWORKS_API_KEY:    ${{ secrets.FIREWORKS_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Trimitere LIVE Free către abonați…"
            python newsletter_build.py --send free --confirm
          elif [ -n "${{ github.event.inputs.test_email }}" ]; then
            python newsletter_build.py --test "${{ github.event.inputs.test_email }}"
          else
            python newsletter_build.py
          fi
      - name: Commit preview-uri dacă s-au schimbat
        if: github.event_name != 'schedule'
        run: |
          git config user.name "Clubul Financiar"
          git config user.email "clubulfinanciar@gmail.com"
          git add docs/newsletter/preview/*.html
          if git diff --staged --quiet; then echo "preview neschimbat"; exit 0; fi
          git commit -m "Newsletter: preview actualizat ($(date -u +%Y-%m-%d))"
          for i in 1 2 3 4 5 6; do
            if git push origin HEAD:main; then echo "pushed"; exit 0; fi
            git fetch origin main; git rebase -X theirs origin/main || git rebase --abort; sleep $((i*3))
          done
