name: Curs valutar BNR (fx.json)

on:
  schedule:
    - cron: '35 11 * * 1-5'   # ~13:35 RO, după publicarea cursului BNR, zile lucrătoare
    - cron: '5 14 * * 1-5'    # plasă de siguranță dacă BNR publică mai târziu
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fx:
    runs-on: ubuntu-latest
    concurrency:
      group: fx-push
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python fx_build.py
      - name: Commit dacă s-a schimbat cursul
        run: |
          git config user.name "Clubul Financiar"
          git config user.email "clubulfinanciar@gmail.com"
          git add docs/data/fx.json
          if git diff --staged --quiet; then
            echo "curs neschimbat"; exit 0
          fi
          git commit -m "Actualizare automată curs BNR ($(date -u +%Y-%m-%d) )"
          for i in 1 2 3 4 5 6; do
            if git push origin HEAD:main; then echo "pushed"; exit 0; fi
            echo "push respins, rebase (#$i)…"
            git fetch origin main
            git rebase -X theirs origin/main || git rebase --abort
            sleep $((i * 3))
          done
          echo "push eșuat după retry"; exit 1
