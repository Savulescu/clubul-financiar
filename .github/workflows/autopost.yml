name: Auto-post Clubul Financiar

on:
  # SCHEDULE DEZACTIVAT temporar (postare manuală 2026-06-22). Reactivează decomentând:
  # schedule:
  #   - cron: '30 16 * * *'   # 16:30 UTC = 19:30 RO vara
  workflow_dispatch: {}   # buton manual (Actions -> Run workflow)

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests requests_oauthlib
      - run: python autopost.py
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          FB_PAGE_ID:       ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN:    ${{ secrets.FB_PAGE_TOKEN }}
          IG_USER_ID:       ${{ secrets.IG_USER_ID }}
          IG_TOKEN:         ${{ secrets.IG_TOKEN }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          TT_CLIENT_KEY:    ${{ secrets.TT_CLIENT_KEY }}
          TT_CLIENT_SECRET: ${{ secrets.TT_CLIENT_SECRET }}
          TT_REFRESH_TOKEN: ${{ secrets.TT_REFRESH_TOKEN }}
          TT_PRIVACY:       ${{ secrets.TT_PRIVACY }}
          X_API_KEY:        ${{ secrets.X_API_KEY }}
          X_API_SECRET:     ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:   ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:  ${{ secrets.X_ACCESS_SECRET }}
          THREADS_USER_ID:  ${{ secrets.THREADS_USER_ID }}
          THREADS_TOKEN:    ${{ secrets.THREADS_TOKEN }}
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME:      ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD:      ${{ secrets.REDDIT_PASSWORD }}
          REDDIT_SUBREDDIT:     ${{ secrets.REDDIT_SUBREDDIT }}
          LINKEDIN_TOKEN:       ${{ secrets.LINKEDIN_TOKEN }}
          LINKEDIN_PERSON_URN:  ${{ secrets.LINKEDIN_PERSON_URN }}
